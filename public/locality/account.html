<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Sign In | Locality</title>

  <link rel="icon" type="image/png" href="images/Gray Locality Favicon.png" />
  <link rel="apple-touch-icon" href="images/Locality Flavicon Spinner.png" />

  <link rel="stylesheet" href="css/locality.css" />
  <link rel="stylesheet" href="css/account.css" />
</head>

<body class="login-page account-page signin-page">
  <main class="auth-shell">
    <section class="auth-card">
      <a href="index.html" class="auth-logo">
        <img src="images/LOCALITY LOGO.png" alt="Locality" />
      </a>

      <p class="login-eyebrow">Workspace access</p>

      <h1>Sign in to Locality.</h1>

      <p class="auth-subtitle">
        Access your workspace to manage your business profile, listings, contracts,
        messages, and local sourcing relationships.
      </p>

      <form class="auth-form" id="signInForm">
        <label>
          Email address
          <input id="signInEmail" type="email" placeholder="you@example.com" autocomplete="email" />
        </label>

        <label>
          <span class="label-row">
            Password
            <button id="forgotPasswordBtn" type="button" class="text-button">
              Forgot password?
            </button>
          </span>
          <input id="signInPassword" type="password" placeholder="Enter your password" autocomplete="current-password" />
        </label>

        <button id="signInSubmit" type="submit" class="auth-primary-btn">
          Sign in
        </button>

        <p id="authStatus" class="auth-status">
          Enter your email and password to continue.
        </p>
      </form>

      <div class="auth-divider">
        <span></span>
        <p>New to Locality?</p>
        <span></span>
      </div>

      <a href="signup.html" class="auth-secondary-btn">
        Create a new account
      </a>

      <div class="auth-footer-links">
        <a href="map.html">Continue as guest</a>
        <a href="login.html">Back to access options</a>
      </div>
    </section>

      <aside class="auth-side-panel auth-orb-panel" aria-hidden="true">
  <div class="auth-art-panel">
    <div class="auth-art-grid"></div>

    <div class="auth-art-glow auth-art-glow-top"></div>
    <div class="auth-art-glow auth-art-glow-bottom"></div>

    <div class="auth-liquid-orb">
      <div class="orb-aura"></div>
      <div class="orb-core"></div>

      <div class="mesh-layer mesh-layer-one"></div>
      <div class="mesh-layer mesh-layer-two"></div>
      <div class="mesh-layer mesh-layer-three"></div>

      <div class="mesh-ring mesh-ring-one"></div>
      <div class="mesh-ring mesh-ring-two"></div>
      <div class="mesh-ring mesh-ring-three"></div>
      <div class="mesh-ring mesh-ring-four"></div>
      <div class="mesh-ring mesh-ring-five"></div>

      <div class="mesh-dots mesh-dots-one"></div>
      <div class="mesh-dots mesh-dots-two"></div>

      <span class="mesh-particle particle-1"></span>
      <span class="mesh-particle particle-2"></span>
      <span class="mesh-particle particle-3"></span>
      <span class="mesh-particle particle-4"></span>
      <span class="mesh-particle particle-5"></span>
      <span class="mesh-particle particle-6"></span>
      <span class="mesh-particle particle-7"></span>
      <span class="mesh-particle particle-8"></span>
      <span class="mesh-particle particle-9"></span>
      <span class="mesh-particle particle-10"></span>
    </div>
  </div>
</aside>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseConfig.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/authService.js"></script>
  <script src="js/profileService.js"></script>
  <script src="js/account.js"></script>
</body>
</html>
