<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Sign In | Locality</title>

  <link rel="icon" type="image/png" href="images/Gray Locality Favicon.png" />
  <link rel="apple-touch-icon" href="images/Locality Flavicon Spinner.png" />

  <link rel="stylesheet" href="css/locality.css" />
  <link rel="stylesheet" href="css/account.css" />
</head>

<body class="login-page account-page signin-page">
  <main class="auth-shell">
    <section class="auth-card">
      <a href="index.html" class="auth-logo">
        <img src="images/LOCALITY LOGO.png" alt="Locality" />
      </a>

      <p class="login-eyebrow">Workspace access</p>

      <h1>Sign in to Locality.</h1>

      <p class="auth-subtitle">
        Access your workspace to manage your business profile, listings, contracts,
        messages, and local sourcing relationships.
      </p>

      <form class="auth-form" id="signInForm">
        <label>
          Email address
          <input id="signInEmail" type="email" placeholder="you@example.com" autocomplete="email" />
        </label>

        <label>
          <span class="label-row">
            Password
            <button id="forgotPasswordBtn" type="button" class="text-button">
              Forgot password?
            </button>
          </span>
          <input id="signInPassword" type="password" placeholder="Enter your password" autocomplete="current-password" />
        </label>

        <button id="signInSubmit" type="submit" class="auth-primary-btn">
          Sign in
        </button>

        <p id="authStatus" class="auth-status">
          Enter your email and password to continue.
        </p>
      </form>

      <div class="auth-divider">
        <span></span>
        <p>New to Locality?</p>
        <span></span>
      </div>

      <a href="signup.html" class="auth-secondary-btn">
        Create a new account
      </a>

      <div class="auth-footer-links">
        <a href="map.html">Continue as guest</a>
        <a href="login.html">Back to access options</a>
      </div>
    </section>

      <aside class="auth-side-panel auth-orb-panel" aria-hidden="true">
  <div class="auth-art-panel">
    <div class="auth-art-grid"></div>
    <div class="auth-art-glow auth-art-glow-1"></div>
    <div class="auth-art-glow auth-art-glow-2"></div>

    <svg class="auth-liquid-orb" viewBox="0 0 520 520" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="localityMeshStroke" x1="90" y1="90" x2="430" y2="430" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#7ed957" />
          <stop offset="45%" stop-color="#17c964" />
          <stop offset="100%" stop-color="#1d3d74" />
        </linearGradient>

        <radialGradient id="localityMeshGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="rgba(126, 217, 87, 0.22)" />
          <stop offset="60%" stop-color="rgba(23, 201, 100, 0.10)" />
          <stop offset="100%" stop-color="rgba(255,255,255,0)" />
        </radialGradient>
      </defs>

      <circle cx="260" cy="260" r="135" fill="url(#localityMeshGlow)" class="orb-core"></circle>

      <g class="orb-float">
        <path class="mesh-layer mesh-layer-1" d="M260 96C324 94 387 125 414 183C442 242 431 319 387 373C344 426 273 447 205 433C142 420 91 377 73 316C56 258 66 190 102 143C138 98 200 97 260 96Z"></path>

        <path class="mesh-layer mesh-layer-4" d="M260 96C324 94 387 125 414 183C442 242 431 319 387 373C344 426 273 447 205 433C142 420 91 377 73 316C56 258 66 190 102 143C138 98 200 97 260 96Z"></path>
        <path class="mesh-layer mesh-layer-5" d="M260 96C324 94 387 125 414 183C442 242 431 319 387 373C344 426 273 447 205 433C142 420 91 377 73 316C56 258 66 190 102 143C138 98 200 97 260 96Z"></path>
        <path class="mesh-layer mesh-layer-6" d="M260 96C324 94 387 125 414 183C442 242 431 319 387 373C344 426 273 447 205 433C142 420 91 377 73 316C56 258 66 190 102 143C138 98 200 97 260 96Z"></path>

        <path class="mesh-dots" d="M260 96C324 94 387 125 414 183C442 242 431 319 387 373C344 426 273 447 205 433C142 420 91 377 73 316C56 258 66 190 102 143C138 98 200 97 260 96Z"></path>

        <ellipse class="mesh-ring mesh-ring-1" cx="260" cy="260" rx="150" ry="88"></ellipse>
        <ellipse class="mesh-ring mesh-ring-2" cx="260" cy="260" rx="138" ry="104"></ellipse>

        <circle class="mesh-particle particle-9" cx="388" cy="198" r="3.2"></circle>
        <circle class="mesh-particle particle-10" cx="384" cy="323" r="3"></circle>
        <circle class="mesh-particle particle-11" cx="281" cy="406" r="3.5"></circle>

      </g>
    </svg>
  </div>
</aside>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseConfig.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/authService.js"></script>
  <script src="js/profileService.js"></script>
  <script src="js/account.js"></script>
</body>
</html>
