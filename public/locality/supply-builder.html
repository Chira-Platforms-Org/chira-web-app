<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Supply Builder | Locality</title>

  <link rel="icon" type="image/png" href="images/Locality Flavicon Spinner.png" />
  <link rel="apple-touch-icon" href="images/Locality Flavicon Spinner.png" />

  <link rel="stylesheet" href="css/locality.css" />
  <link rel="stylesheet" href="css/supply-builder.css" />
</head>

<body>
  <main style="min-height: 100vh; display: grid; place-items: center; padding: 40px;">
    <section style="max-width: 760px; padding: 36px; border-radius: 32px; background: rgba(255,255,255,0.86); box-shadow: 0 24px 70px rgba(20,50,92,0.11);">
      <p style="color: var(--green); font-weight: 950; text-transform: uppercase; letter-spacing: 0.08em;">Supply setup</p>
      <h1 style="color: var(--navy); font-size: clamp(2rem, 5vw, 3.8rem); line-height: 0.95; letter-spacing: -0.05em;">Supply & Products Builder</h1>
      <p style="margin-top: 18px; color: var(--muted); font-weight: 800; line-height: 1.6;">
        This is where you’ll add products, availability, unit sizes, pricing, minimum orders, and fulfillment details.
      </p>
      <a href="profile-builder.html" style="display: inline-flex; margin-top: 22px; padding: 12px 18px; border-radius: 999px; background: var(--green); color: white; text-decoration: none; font-weight: 950;">Back to profile builder</a>
    </section>
  </main>

  <script src="js/supplyBuilder.js"></script>
</body>
</html>
