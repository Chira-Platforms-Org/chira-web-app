<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <base href="/" />

  <title>Opening My Locality | Locality</title>

  <link
    rel="icon"
    type="image/png"
    href="images/Locality Flavicon Spinner.png"
  />

  <link
    rel="apple-touch-icon"
    href="images/Locality Flavicon Spinner.png"
  />

  <link rel="stylesheet" href="css/locality.css" />
  <link rel="stylesheet" href="css/my-locality.css" />
</head>

<body class="my-locality-router-page">
  <main
    class="my-locality-router"
    role="status"
    aria-live="polite"
  >
    <section class="my-locality-router-card">
      <img
        src="images/LOCALITY LOGO.png"
        alt="Locality"
      />

      <p class="page-kicker green">
        My Locality
      </p>

      <h1>
        Opening your workspace.
      </h1>

      <p id="myLocalityRouterStatus">
        Checking your account type...
      </p>

      <div
        class="my-locality-router-spinner"
        aria-hidden="true"
      ></div>
    </section>
  </main>

  <script
    src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
  ></script>

  <script src="js/supabaseConfig.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/authService.js"></script>
  <script src="js/profileService.js"></script>
  <script src="js/myLocality.js"></script>
</body>
</html>
